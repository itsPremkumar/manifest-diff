name: CI
on:
  push:
    branches: [main, master]
  pull_request:
jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.8", "3.11"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Compile
        run: python -m py_compile $(find . -name "*.py" -not -path "./.git/*")
      - name: Self-tests
        run: |
          for t in $(find . -name "*.py" -not -path "./.git/*" -not -path "./ci/*"); do
            python "$t" self-test || exit 1
          done
  deploy-check:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python ci/ci_check.py
